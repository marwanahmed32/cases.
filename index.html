<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="قضايا المستشار"/>
<title>إدارة قضايا المستشار</title>
<style>
:root {
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#8a6e2f;--gold-bg:rgba(201,168,76,0.08);--gold-br:rgba(201,168,76,0.22);
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;--bg5:#2a2a2a;
  --text:#f0f0f0;--tm:#888;--td:#555;
  --br:#2a2a2a;--br2:#333;
  --ok:#2ecc71;--ok-bg:rgba(46,204,113,0.1);--ok-br:rgba(46,204,113,0.25);
  --warn:#f39c12;--warn-bg:rgba(243,156,18,0.1);--warn-br:rgba(243,156,18,0.25);
  --err:#e74c3c;--err-bg:rgba(231,76,60,0.1);--err-br:rgba(231,76,60,0.25);
  --blue:#3498db;--blue-bg:rgba(52,152,219,0.1);
  --r:14px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ONBOARD */
.onboard{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.ob-logo{width:70px;height:70px;border-radius:50%;background:var(--gold-bg);border:2px solid var(--gold-br);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.ob-logo svg{width:36px;height:36px;fill:var(--gold)}
.ob-title{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px;text-align:center}
.ob-sub{font-size:14px;color:var(--tm);text-align:center;margin-bottom:32px;line-height:1.6}
.ob-form{width:100%;max-width:340px}
.ob-inp{width:100%;padding:14px;border:1px solid var(--br2);border-radius:12px;background:var(--bg3);color:var(--text);font-size:16px;font-family:inherit;direction:rtl;margin-bottom:12px}
.ob-inp:focus{outline:none;border-color:var(--gold)}
.ob-btn{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--gold-br);padding:12px 14px;padding-top:calc(12px + var(--st));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;flex-direction:column;gap:1px}
.hdr-welcome{font-size:11px;color:var(--gold-d);letter-spacing:.5px}
.hdr-name{font-size:16px;font-weight:800;color:var(--gold)}
.hdr-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold-br);background:var(--gold-bg);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr-icon svg{width:18px;height:18px;fill:var(--gold)}

/* NAV */
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--br);padding-bottom:var(--sb);flex-shrink:0}
.nb{flex:1;padding:9px 2px 7px;background:none;border:none;color:var(--td);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;border-top:2px solid transparent;transition:color .2s}
.nb svg{width:21px;height:21px}
.nb.active{color:var(--gold);border-top-color:var(--gold)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;background:var(--bg)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.st{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px 11px}
.stv{font-size:24px;font-weight:800}
.stl{font-size:11px;color:var(--tm);margin-top:2px}
.cg .stv{color:var(--gold)}.cs .stv{color:var(--ok)}.cw .stv{color:var(--warn)}.ce .stv{color:var(--err)}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.ba{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br)}
.bp{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-br)}
.bc{background:rgba(255,255,255,.05);color:var(--tm);border:1px solid var(--br)}
.bn{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-br)}

/* CASE CARD */
.cc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px;border-right:3px solid var(--br2);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.cc:active{opacity:.8}
.cc.active{border-right-color:var(--ok)}.cc.pending{border-right-color:var(--warn)}.cc.closed{border-right-color:var(--td)}.cc.new{border-right-color:var(--gold)}

.cc-body{flex:1;min-width:0}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.cc-name{font-size:14px;font-weight:700;flex:1;line-height:1.3;color:var(--text)}
.cc-meta{font-size:12px;color:var(--tm);margin-bottom:7px;display:flex;flex-wrap:wrap;gap:8px}
.cc-bot{display:flex;justify-content:space-between;align-items:center}
.cc-fee{font-size:14px;font-weight:700;color:var(--gold)}
.cc-sess{font-size:12px;color:var(--td)}

/* SESSION CARD */
.sc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 13px;margin-bottom:9px;display:flex;gap:11px;align-items:center}
.sd{background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:10px;padding:7px 9px;text-align:center;min-width:50px;flex-shrink:0}
.sdd{font-size:20px;font-weight:800;line-height:1;color:var(--gold)}
.sdm{font-size:10px;font-weight:600;color:var(--gold-d)}
.si{flex:1;min-width:0}
.sn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sd2{font-size:12px;color:var(--tm);margin-top:2px}
.st2{font-size:12px;color:var(--gold);margin-top:3px;font-weight:600}
.sms-n{font-size:11px;color:var(--warn);margin-top:3px}

/* ALERT */
.abn{background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:var(--r);padding:12px 13px;margin-bottom:11px;display:flex;gap:9px;align-items:center}
.abt{font-size:13px;font-weight:700;color:var(--warn)}
.abs{font-size:12px;color:var(--warn);opacity:.8}

/* OVERDUE */
.obn{background:var(--err-bg);border:1px solid var(--err-br);border-radius:var(--r);padding:12px 13px;margin-bottom:11px;display:flex;gap:9px;align-items:center}
.obt{font-size:13px;font-weight:700;color:var(--err)}

/* SEC TITLE */
.sct{font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}

/* FINANCE */
.fr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);font-size:14px}
.fr:last-child{border-bottom:none}
.fl{color:var(--tm)}
.fp{color:var(--ok);font-weight:700}.fd{color:var(--err);font-weight:700}.ft{color:var(--gold);font-weight:700}
.pb{background:var(--bg4);border-radius:4px;height:5px;margin-top:9px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:var(--gold);transition:width .3s}
.pf.done{background:var(--ok)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:9px}
.ct{font-size:14px;font-weight:700;margin-bottom:9px;color:var(--text)}

/* FAB */
.fab{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%);background:var(--gold);color:#000;border:none;border-radius:50px;padding:13px 24px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);display:flex;align-items:center;gap:7px;z-index:50;white-space:nowrap}
.fab svg{width:19px;height:19px;fill:#000}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--gold-br);padding:18px 15px calc(22px + var(--sb));width:100%;max-height:93vh;overflow-y:auto}
.mh{width:34px;height:4px;background:var(--br2);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:17px;font-weight:800;margin-bottom:16px;color:var(--text)}
.fg{margin-bottom:13px}
.fg label{font-size:11px;color:var(--tm);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 13px;border:1px solid var(--br2);border-radius:10px;background:var(--bg3);color:var(--text);font-size:15px;font-family:inherit;direction:rtl;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.br{display:flex;gap:9px;margin-top:16px}
.bsave{flex:2;background:var(--gold);color:#000;border:none;padding:13px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.bcan{flex:1;background:var(--bg3);color:var(--tm);border:1px solid var(--br);padding:13px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bpay{width:100%;background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br);padding:11px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:9px;font-family:inherit}
.bdel{background:var(--err-bg);color:var(--err);border:1px solid var(--err-br)}
.sbox{background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:var(--r);padding:11px 13px;margin-bottom:12px;display:flex;gap:9px;align-items:center}
.sbox svg{width:19px;height:19px;fill:var(--gold);flex-shrink:0}
.sbt{font-size:13px;font-weight:700;color:var(--gold)}
.sbs{font-size:12px;color:var(--gold-d);margin-top:2px}

.empty{text-align:center;padding:48px 20px;color:var(--td)}
.empty svg{width:46px;height:46px;fill:var(--br2);display:block;margin:0 auto 13px}
.empty p{font-size:15px;font-weight:600;color:var(--tm)}
.empty small{font-size:13px;display:block;margin-top:5px}
.spacer{height:88px}
option{background:#1a1a1a}

/* DASHBOARD */
.dash-row{display:flex;gap:9px;margin-bottom:9px}
.dash-row .st{flex:1}
.chart-bar-wrap{margin-bottom:12px}
.bar-lbl{font-size:12px;color:var(--tm);margin-bottom:4px;display:flex;justify-content:space-between}
.bar-track{background:var(--bg4);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--gold);transition:width .4s}
.ai-box{background:var(--bg3);border:1px solid var(--gold-br);border-radius:var(--r);padding:14px;margin-bottom:12px}
.ai-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ai-content{font-size:13px;color:var(--tm);line-height:1.7;white-space:pre-wrap}
.ai-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000;border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-btn svg{width:18px;height:18px;fill:#000}
.ai-loading{color:var(--gold);font-size:13px;text-align:center;padding:14px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.week-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--br);font-size:13px}
.week-item:last-child{border-bottom:none}

/* NOTIF PANEL */
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--err);border-radius:50%;display:none}
.notif-dot.show{display:block}

/* edit icon */
.edit-btn{background:none;border:none;color:var(--gold-d);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit;font-weight:600}
.edit-btn:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hdr-left">
      <div class="hdr-welcome" id="hdr-welcome">نظام</div>
      <div class="hdr-name" id="hdr-name">إدارة قضايا المستشار</div>
    </div>
    <div style="position:relative">
      <button class="hdr-icon" onclick="showNotifPanel()">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <div class="notif-dot" id="notif-dot"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav">
    <button class="nb active" onclick="goTab('home',this)">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>الرئيسية
    </button>
    <button class="nb" onclick="goTab('dash',this)">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>لوحة التحكم
    </button>
    <button class="nb" onclick="goTab('cases',this)">
      <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>القضايا
    </button>
    <button class="nb" onclick="goTab('sessions',this)">
      <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.89-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.11-.89-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>الجلسات
    </button>
    <button class="nb" onclick="goTab('finance',this)">
      <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>المالية
    </button>
  </nav>
</div>
<div id="modal-container"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const PHONE_ME = "01026024266";
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

// ─── STORE ───────────────────────────────────────────────
let store = {
  profile: JSON.parse(localStorage.getItem('qd_profile') || 'null'),
  cases: JSON.parse(localStorage.getItem('qd_cases') || '[]')
};
function save() {
  localStorage.setItem('qd_profile', JSON.stringify(store.profile));
  localStorage.setItem('qd_cases', JSON.stringify(store.cases));
}

// ─── ONBOARDING ──────────────────────────────────────────
function checkOnboard() {
  if (!store.profile) showOnboard();
  else initApp();
}

function showOnboard() {
  document.body.insertAdjacentHTML('beforeend', `
  <div class="onboard" id="onboard">
    <div class="ob-logo"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
    <div class="ob-title">إدارة قضايا المستشار</div>
    <div class="ob-sub">مرحباً بك في نظام إدارة القضايا<br>من فضلك أدخل بياناتك للبدء</div>
    <div class="ob-form">
      <input class="ob-inp" id="ob-name" placeholder="اسم المستشار / المحامي *" />
      <input class="ob-inp" id="ob-phone" type="tel" placeholder="رقم الهاتف للتنبيهات * (01xxxxxxxxx)" />
      <button class="ob-btn" onclick="submitOnboard()">ابدأ الآن ←</button>
    </div>
  </div>`);
}

function submitOnboard() {
  const name = document.getElementById('ob-name').value.trim();
  const phone = document.getElementById('ob-phone').value.trim();
  if (!name) { alert('من فضلك أدخل الاسم'); return; }
  if (!phone) { alert('من فضلك أدخل رقم الهاتف للتنبيهات'); return; }
  store.profile = { name, phone };
  save();
  document.getElementById('onboard').remove();
  initApp();
}

function initApp() {
  document.getElementById('hdr-welcome').textContent = 'مرحباً سيادة المستشار';
  document.getElementById('hdr-name').textContent = store.profile.name;
  scheduleReminders();
  render();
  checkNotifDot();
}

// ─── REMINDERS ───────────────────────────────────────────
function scheduleReminders() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => { if (p==='granted') doReminders(); });
  } else if (Notification.permission === 'granted') {
    doReminders();
  }
}

function doReminders() {
  const tmr = getTomorrow();
  const allSess = store.cases.flatMap(c => c.sessions.map(s => ({...s, caseName:c.name})));
  const alerts = allSess.filter(s => s.status==='upcoming' && s.date===tmr);
  alerts.forEach(s => {
    new Notification('⚖️ تذكير جلسة غداً', {
      body: `${s.caseName} — الساعة ${s.time}`,
      icon: ''
    });
  });
  // Also check overdue payments
  const overdue = store.cases.filter(c => c.status !== 'closed' && (c.totalFee - c.paid) > 0);
  if (overdue.length > 0) {
    document.getElementById('notif-dot').classList.add('show');
  }
}

function checkNotifDot() {
  const tmr = getTomorrow();
  const allSess = store.cases.flatMap(c => c.sessions.map(s => ({...s})));
  const hasTmr = allSess.some(s => s.status==='upcoming' && s.date===tmr);
  const hasOverdue = store.cases.some(c => c.status!=='closed' && (c.totalFee-c.paid)>0);
  if (hasTmr || hasOverdue) document.getElementById('notif-dot').classList.add('show');
}

function getTomorrow() {
  const t = new Date(); t.setDate(t.getDate()+1);
  return t.toISOString().split('T')[0];
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

// ─── NAV ─────────────────────────────────────────────────
let currentTab = 'home';
function goTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function statusLabel(s) { return {active:'نشطة',pending:'معلقة',closed:'منتهية',new:'جديدة'}[s]||s; }

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (currentTab==='home') el.innerHTML = renderHome();
  else if (currentTab==='dash') el.innerHTML = renderDash();
  else if (currentTab==='cases') el.innerHTML = renderCases();
  else if (currentTab==='sessions') el.innerHTML = renderSessions();
  else if (currentTab==='finance') el.innerHTML = renderFinance();
  el.scrollTop = 0;
}

// ─── HOME ────────────────────────────────────────────────
function renderHome() {
  const total = store.cases.length;
  if (!total) return `<div class="empty" style="margin-top:60px;">
    <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>

    <small>اضغط "القضايا" لإضافة أول قضية</small>
  </div>`;

  const active = store.cases.filter(c=>c.status==='active').length;
  const totalFee = store.cases.reduce((s,c)=>s+c.totalFee,0);
  const totalDue = store.cases.reduce((s,c)=>s+(c.totalFee-c.paid),0);
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name})));
  const upcoming = allSess.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));
  const tmr = getTomorrow();
  const today = getToday();
  const alerts = upcoming.filter(s=>s.date===tmr||s.date===today);
  const overdueC = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);

  let html = '';
  if (alerts.length) html += `<div class="abn"><span style="font-size:20px">⚠️</span><div><div class="abt">جلسة ${alerts[0].date===today?'اليوم':'غداً'}!</div><div class="abs">${alerts[0].caseName} — ${alerts[0].time}</div></div></div>`;
  if (overdueC.length) html += `<div class="obn"><span style="font-size:20px">💰</span><div><div class="obt">${overdueC.length} قضي${overdueC.length===1?'ة':'ايا'} بها أتعاب متأخرة</div></div></div>`;

  html += `<div class="sg">
    <div class="st cg"><div class="stv">${total}</div><div class="stl">إجمالي القضايا</div></div>
    <div class="st cs"><div class="stv">${active}</div><div class="stl">نشطة</div></div>
    <div class="st cw"><div class="stv">${totalFee.toLocaleString()}</div><div class="stl">إجمالي الأتعاب (ج)</div></div>
    <div class="st ce"><div class="stv">${totalDue.toLocaleString()}</div><div class="stl">المتبقي (ج)</div></div>
  </div>`;

  if (upcoming.length) {
    html += `<div class="sct">الجلسات القادمة</div>`;
    upcoming.slice(0,3).forEach(s => { html += sessCardHTML(s, s.caseName); });
  }
  html += `<div class="sct">آخر القضايا</div>`;
  store.cases.slice(0,3).forEach(c => { html += caseCardHTML(c, false); });
  return html;
}

// ─── DASHBOARD ───────────────────────────────────────────
function renderDash() {
  const total = store.cases.length;
  const active = store.cases.filter(c=>c.status==='active').length;
  const closed = store.cases.filter(c=>c.status==='closed').length;
  const totalFee = store.cases.reduce((s,c)=>s+c.totalFee,0);
  const totalPaid = store.cases.reduce((s,c)=>s+c.paid,0);
  const totalDue = totalFee - totalPaid;
  const collectRate = totalFee ? Math.round(totalPaid/totalFee*100) : 0;

  // Weekly sessions
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  const ws = weekStart.toISOString().split('T')[0];
  const we = weekEnd.toISOString().split('T')[0];
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name,caseId:c.id})));
  const weekSess = allSess.filter(s=>s.date>=ws&&s.date<=we&&s.status==='upcoming');

  // Overdue payments
  const overdueList = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);

  // Case types distribution
  const types = {};
  store.cases.forEach(c=>{ types[c.type]=(types[c.type]||0)+1; });
  const maxType = Math.max(...Object.values(types),1);

  let html = `<div class="sct">نظرة عامة</div>
  <div class="sg">
    <div class="st cg"><div class="stv">${total}</div><div class="stl">إجمالي القضايا</div></div>
    <div class="st cs"><div class="stv">${active}</div><div class="stl">نشطة</div></div>
    <div class="st cw"><div class="stv">${closed}</div><div class="stl">منتهية</div></div>
    <div class="st ce"><div class="stv">${totalDue.toLocaleString()}</div><div class="stl">متبقي (ج)</div></div>
  </div>

  <div class="card">
    <div class="ct">نسبة التحصيل المالي</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;">
      <span style="color:var(--ok)">محصّل: ${totalPaid.toLocaleString()} ج</span>
      <span style="color:var(--err)">متبقي: ${totalDue.toLocaleString()} ج</span>
    </div>
    <div class="pb" style="height:10px;"><div class="pf ${collectRate===100?'done':''}" style="width:${collectRate}%"></div></div>
    <div style="text-align:center;font-size:13px;color:var(--tm);margin-top:7px;">${collectRate}% تم التحصيل</div>
  </div>`;

  if (Object.keys(types).length) {
    html += `<div class="card"><div class="ct">توزيع القضايا حسب النوع</div>`;
    Object.entries(types).sort((a,b)=>b[1]-a[1]).forEach(([t,n])=>{
      const pct = Math.round(n/maxType*100);
      html += `<div class="chart-bar-wrap">
        <div class="bar-lbl"><span>${t}</span><span style="color:var(--gold)">${n}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="sct">جلسات هذا الأسبوع (${weekSess.length})</div>`;
  if (weekSess.length) {
    html += `<div class="card">`;
    weekSess.forEach(s=>{
      const d = new Date(s.date);
      html += `<div class="week-item">
        <span>${s.caseName}</span>
        <span style="color:var(--gold);font-size:12px;">${DAYS[d.getDay()]} ${s.time}</span>
      </div>`;
    });
    html += `</div>`;
  } else html += `<div style="font-size:13px;color:var(--td);padding:8px 0 12px;">لا جلسات هذا الأسبوع</div>`;

  if (overdueList.length) {
    html += `<div class="sct">أتعاب متأخرة (${overdueList.length})</div><div class="card">`;
    overdueList.forEach(c=>{
      const due = c.totalFee - c.paid;
      html += `<div class="week-item">
        <span>${c.name}</span>
        <span style="color:var(--err);font-size:12px;">متبقي ${due.toLocaleString()} ج</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="sct">تحليل الذكاء الاصطناعي</div>
  <div class="ai-box" id="ai-box">
    <div class="ai-title">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:var(--gold)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      تحليل ذكي للملف
    </div>
    <div class="ai-content" id="ai-content" style="color:var(--td)">اضغط الزر أدناه لتحليل وضع قضاياك الحالي بالذكاء الاصطناعي</div>
    <button class="ai-btn" onclick="runAI()">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      تحليل بالذكاء الاصطناعي
    </button>
  </div>
  <div class="spacer"></div>`;

  return html;
}

// ─── AI ANALYSIS ─────────────────────────────────────────
async function runAI() {
  const btn = document.querySelector('.ai-btn');
  const content = document.getElementById('ai-content');
  if (!content) return;
  btn.disabled = true;
  content.innerHTML = '<div class="ai-loading">⏳ جاري التحليل...</div>';

  const total = store.cases.length;
  const active = store.cases.filter(c=>c.status==='active').length;
  const totalFee = store.cases.reduce((s,c)=>s+c.totalFee,0);
  const totalPaid = store.cases.reduce((s,c)=>s+c.paid,0);
  const due = totalFee - totalPaid;
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name})));
  const upcoming = allSess.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));
  const overdueC = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);
  const types = {};
  store.cases.forEach(c=>{ types[c.type]=(types[c.type]||0)+1; });

  const prompt = `أنت مساعد قانوني ذكي لمحامٍ مصري. بناءً على البيانات التالية قدم تحليلاً عملياً وتوصيات:

ملخص القضايا:
- إجمالي القضايا: ${total}
- نشطة: ${active}
- إجمالي الأتعاب: ${totalFee.toLocaleString()} ج.م
- المحصّل: ${totalPaid.toLocaleString()} ج.م  
- المتبقي: ${due.toLocaleString()} ج.م
- قضايا بأتعاب متأخرة: ${overdueC.length} (${overdueC.map(c=>`${c.name}: ${(c.totalFee-c.paid).toLocaleString()} ج`).join(', ')})
- أنواع القضايا: ${Object.entries(types).map(([t,n])=>`${t}(${n})`).join(', ')}
- جلسات قادمة: ${upcoming.length} (أقرب: ${upcoming[0]?.date||'لا يوجد'})

قدم: ١) تقييم الوضع المالي ٢) تحذيرات عاجلة ٣) توصيات أسبوعية ٤) نصائح تحسين الأداء
الرد باللغة العربية بشكل موجز ومنظم.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(b=>b.text||'').join('') || 'لم يتم الحصول على تحليل';
    content.textContent = text;
  } catch(e) {
    content.textContent = '⚠️ تعذر الاتصال بالذكاء الاصطناعي. تأكد من الاتصال بالإنترنت وحاول مرة أخرى.';
  }
  btn.disabled = false;
}

function caseCardHTML(c, showDel=false) {
  const upSess = c.sessions.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));
  const due = c.totalFee - c.paid;
  return `<div class="cc ${c.status}" id="cc-${c.id}" style="position:relative">
    <div class="cc-body" onclick="openCase(${c.id})" style="flex:1">
      <div class="cc-top">
        <div class="cc-name">${c.name}</div>
        <span class="badge ${c.status==='active'?'ba':c.status==='pending'?'bp':c.status==='new'?'bn':'bc'}">${statusLabel(c.status)}</span>
      </div>
      <div class="cc-meta">
        <span>👤 ${c.client}</span>
        <span>⚖️ ${c.type}</span>
        ${c.court?`<span>🏛 ${c.court}</span>`:''}
      </div>
      <div class="cc-bot">
        <div class="cc-fee">${c.totalFee.toLocaleString()} ج${due>0?` · <span style="color:var(--err);font-size:12px;">متبقي ${due.toLocaleString()}</span>`:''}</div>

      </div>

function confirmDelete(id) {
  const c = store.cases.find(x=>x.id===id);
  if (!c) return;
  if (!confirm('حذف قضية "' + c.name + '"؟\n\nالجلسات ستُحذف، لكن السجل المالي سيبقى محفوظاً باسمها.')) return;
  // Archive financial record before deleting
  const archive = JSON.parse(localStorage.getItem('qd_archive') || '[]');
  archive.push({ id:c.id, name:c.name, client:c.client, type:c.type, totalFee:c.totalFee, paid:c.paid, deletedAt: new Date().toLocaleDateString('ar-EG') });
  localStorage.setItem('qd_archive', JSON.stringify(archive));
  store.cases = store.cases.filter(x=>x.id!==id);
  save(); closeModal(); render();
}

function removeArchive(id) {
  if (!confirm('حذف هذا السجل المالي نهائياً؟')) return;

  archive = archive.filter(a=>String(a.id)!==String(id));
  localStorage.setItem('qd_archive', JSON.stringify(archive));
  render();

function markDone(caseId, sessId) {
  const c = store.cases.find(x=>x.id===caseId);
  if (c) { const s=c.sessions.find(x=>x.id===sessId); if(s) s.status='done'; }
  save(); closeModal(); render();
}

function recordPayment(id) {
  const c = store.cases.find(x=>x.id===id);
  if (!c) return;
  const due = c.totalFee - c.paid;
  if (due<=0) { alert('تم تحصيل كامل الأتعاب'); return; }
  const amt = prompt(`المتبقي: ${due.toLocaleString()} ج.م\nأدخل مبلغ الدفعة:`);
  if (!amt||isNaN(amt)||parseInt(amt)<=0) return;
  c.paid = Math.min(c.paid+parseInt(amt), c.totalFee);
  save(); render();
}

function deleteCase(id) {
  if (!confirm('حذف هذه القضية نهائياً؟')) return;
  store.cases = store.cases.filter(c=>c.id!==id);
  save(); closeModal(); render();
}

function showNotifPanel() {
  const tmr = getTomorrow();
  const today = getToday();
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name})));
  const alerts = allSess.filter(s=>s.status==='upcoming'&&(s.date===tmr||s.date===today));
  const overdue = store.cases.filter(c=>c.status!=='closed'&&(c.totalFee-c.paid)>0);

  let html = `<div class="mh"></div><h2>🔔 التنبيهات</h2>`;

    html += `<div style="text-align:center;padding:24px;color:var(--td)">لا تنبيهات حالياً ✅</div>`;

    if (alerts.length) {
      html += `<div class="sct">جلسات اليوم / غداً</div>`;
      alerts.forEach(s=>{ html += `<div class="abn" style="margin-bottom:8px"><span>⚠️</span><div><div class="abt">${s.caseName}</div><div class="abs">${s.date} — ${s.time}</div></div></div>`; });
    }

  }
  html += `<div style="margin-top:16px;padding:12px;background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:var(--r);font-size:12px;color:var(--gold-d)">

    return `<tr style="color:#aaa">

      <td style="text-align:left">${a.totalFee.toLocaleString()} ج</td>
      <td style="text-align:left;color:#27ae60">${a.paid.toLocaleString()} ج</td>
      <td style="text-align:left;color:#c0392b">${due>0?due.toLocaleString()+' ج':'✓ مكتمل'}</td>
      <td>${a.totalFee?Math.round(a.paid/a.totalFee*100):0}%</td>
    </tr>`;
  }).join('');

  openPrint(`
    <h2 style="color:#8a6e2f;margin-bottom:4px">إدارة قضايا المستشار</h2>
    <div style="color:#888;font-size:13px;margin-bottom:16px">التقرير المالي — ${today} | المستشار: ${store.profile?.name||''}</div>
    <div style="display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap">
      <div style="background:#f9f5e8;border:1px solid #c9a84c;border-radius:8px;padding:12px 18px;min-width:130px">
        <div style="font-size:11px;color:#8a6e2f">إجمالي الأتعاب</div>
        <div style="font-size:20px;font-weight:800;color:#c9a84c">${totalFee.toLocaleString()} ج</div>
      </div>
      <div style="background:#f0faf5;border:1px solid #27ae60;border-radius:8px;padding:12px 18px;min-width:130px">
        <div style="font-size:11px;color:#1a7a42">المحصّل</div>
        <div style="font-size:20px;font-weight:800;color:#27ae60">${totalPaid.toLocaleString()} ج</div>
      </div>
      <div style="background:#fdf0f0;border:1px solid #c0392b;border-radius:8px;padding:12px 18px;min-width:130px">
        <div style="font-size:11px;color:#922b21">المتبقي</div>
        <div style="font-size:20px;font-weight:800;color:#c0392b">${totalDue.toLocaleString()} ج</div>
      </div>
    </div>
    <table>
      <thead><tr><th>القضية</th><th>العميل</th><th>النوع</th><th>الأتعاب</th><th>المحصّل</th><th>المتبقي</th><th>النسبة</th></tr></thead>
      <tbody>${rows}${archiveRows}</tbody>
      <tfoot><tr style="font-weight:800;background:#f9f5e8">
        <td colspan="3">الإجمالي</td>
        <td>${totalFee.toLocaleString()} ج</td>
        <td style="color:#27ae60">${totalPaid.toLocaleString()} ج</td>
        <td style="color:#c0392b">${totalDue.toLocaleString()} ج</td>
        <td>${totalFee?Math.round(totalPaid/totalFee*100):0}%</td>
      </tr></tfoot>
    </table>`);
}

function printSessions() {
  const today = new Date().toLocaleDateString('ar-EG');
  const allSess = store.cases.flatMap(c=>c.sessions.map(s=>({...s,caseName:c.name,client:c.client})));
  const upcoming = allSess.filter(s=>s.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date));
  const done = allSess.filter(s=>s.status==='done').sort((a,b)=>b.date.localeCompare(a.date));

  const rows = (list, cls) => list.map(s => {
    const d = new Date(s.date);
    return `<tr class="${cls}">
      <td>${s.caseName}</td><td>${s.client}</td><td>${s.date}</td>
      <td>${DAYS[d.getDay()]}</td><td>${s.time}</td><td>${s.desc}</td>
      <td>${s.status==='upcoming'?'قادمة':'✓ منتهية'}</td>
    </tr>`;
  }).join('');

  openPrint(`
    <h2 style="color:#8a6e2f;margin-bottom:4px">إدارة قضايا المستشار</h2>
    <div style="color:#888;font-size:13px;margin-bottom:16px">جدول الجلسات — ${today} | المستشار: ${store.profile?.name||''}</div>
    <h3 style="color:#c9a84c;margin-bottom:10px;font-size:15px">الجلسات القادمة (${upcoming.length})</h3>
    <table>
      <thead><tr><th>القضية</th><th>العميل</th><th>التاريخ</th><th>اليوم</th><th>الوقت</th><th>الموضوع</th><th>الحالة</th></tr></thead>
      <tbody>${rows(upcoming,'')}</tbody>
    </table>
    ${done.length?`<h3 style="color:#888;margin:20px 0 10px;font-size:15px">الجلسات المنتهية (${done.length})</h3>
    <table>
      <thead><tr><th>القضية</th><th>العميل</th><th>التاريخ</th><th>اليوم</th><th>الوقت</th><th>الموضوع</th><th>الحالة</th></tr></thead>
      <tbody>${rows(done,'done-row')}</tbody>
    </table>`:''}
  `);
}

function openPrint(bodyHTML) {
  const w = window.open('','_blank','width=900,height=700');
  if (!w) { alert('من فضلك اسمح للتطبيق بفتح نوافذ جديدة'); return; }
  w.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head>
  <meta charset="UTF-8"/>
  <title>قضايا المستشار — ${store.profile?.name||''}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;padding:28px 32px;color:#1a1a1a;background:#fff;direction:rtl}
    h2{font-size:22px;font-weight:800}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
    th{background:#1a1a1a;color:#c9a84c;padding:9px 10px;text-align:right;font-weight:700;font-size:12px}
    td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
    tr:nth-child(even){background:#fafafa}
    tr:hover{background:#f5f0e8}
    .done-row td{color:#999}
    tfoot td{background:#f9f5e8;font-weight:800;border-top:2px solid #c9a84c}
    .print-btn{position:fixed;top:16px;left:16px;background:#c9a84c;color:#000;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;z-index:99}
    .print-btn:hover{background:#e8c97a}
    @media print{.print-btn{display:none}body{padding:14px}}
  </style></head><body>
  <button class="print-btn" onclick="window.print()">🖨️ طباعة / PDF</button>
  ${bodyHTML}
  <div style="margin-top:28px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center">
    تم إنشاء هذا التقرير بواسطة نظام إدارة قضايا المستشار — ${new Date().toLocaleDateString('ar-EG')}
  </div>
  </body></html>`);
  w.document.close();
}
